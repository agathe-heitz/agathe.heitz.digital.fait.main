<!DOCTYPE html>
<html lang="fr">
<head>
  <meta name="google-site-verification" content="MKrEh6DmS9t-MyoIkLkeV58AJ4mwZaHhU4-vCmoZKUE" />
  <meta property="og:site_name" content="Agathe Heitz - Digital fait main">
<meta property="og:title" content="Agathe Heitz - Digital fait main">
  <meta name="Site Agathe Heitz" content="Site Agathe Heitz Digital fait main">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agathe Heitz - Digital fait main</title>
  <meta name="description" content="Agathe Heitz - Digital fait main. Ingénieur & conceptrice pédagogique e-learning.">
  <link rel="icon" type="image/png" href="favicon.png.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Kalam:wght@700&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.cdnfonts.com/css/tt-norms-pro');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #050a30;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem;
      font-family: 'TT Norms Pro', 'TT Norms', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 600;
    }

    @media (max-width: 600px) {
      body {
        padding: 5vw;
        justify-content: center;
        align-items: center;
      }
      #bubbles-container,
      #signature,
      #btn-container {
        width: 100%;
      }
    }

    #bubbles-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: min(720px, 90vw);
    }

    .bubble {
      background: #ffffff;
      color: #050a30;
      font-size: 20px;
      font-family: 'TT Norms Pro', 'TT Norms', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 600;
      line-height: 1.6;
      padding: 18px 28px;
      border-radius: 20px 20px 20px 4px;
      display: block;
      width: 100%;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      word-break: break-word;
    }

    .bubble.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 0.95em;
      background: #050a30;
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    #signature {
      width: min(720px, 90vw);
      text-align: right;
      margin-top: 1.2rem;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    #signature.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #btn-container {
      margin-top: 1.5rem;
      width: min(720px, 90vw);
      display: flex;
      justify-content: center;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s ease 0.3s, transform 0.8s ease 0.3s;
    }

    #btn-container.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #btn-start {
      background: #28f3e1;
      color: #050a30;
      border: none;
      font-family: 'Press Start 2P', monospace;
      font-size: 20px;
      letter-spacing: 0.05em;
      padding: 22px 60px;
      cursor: pointer;
      border-radius: 50px;
      text-decoration: none;
      display: inline-block;
      transition: filter 0.2s ease, transform 0.15s ease;
    }

    #btn-start:hover {
      filter: brightness(1.1);
      transform: scale(1.04);
    }

    #btn-start:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>

  <div id="bubbles-container"></div>

  <div id="signature">
<span style="font-family: 'Kalam', cursive; font-size: 36px; color: #ffffff; font-weight: 700;">Agathe Heitz</span>
  </div>

  <div id="btn-container">
    <a id="btn-start" href="https://sitetestagat.my.canva.site/agathe-heitz-digital-fait-main">Commencer</a>
  </div>

  <script>
    // Chaque groupe = une bulle. Les segments alternent texte brut et HTML coloré.
    // Format : tableau de lignes, chaque ligne est un tableau de segments { text, html }
    // html:true = inséré d'un coup (pas tapé char par char), html:false = tapé normalement
    const groups = [
      [
        [{ text: "Bonjour !" }],
        [{ text: "Bienvenue sur mon " }, { text: "site", color: true }, { text: " :)" }]
      ],
      [
        [{ text: "Vous souhaitez comprendre ce que je fais." }],
        [{ text: "C'est bien ça ?" }]
      ],
      [
[{ text: "Et bien " }, { text: "cliquez", color: true }, { text: "... ↓ " }],
[{ text: "et vous " }, { text: "saurez", color: true }, { text: " ;)" }]
      ]
    ];

    const COLOR = "#28f3e1";
    const container = document.getElementById('bubbles-container');
    const btnContainer = document.getElementById('btn-container');
    const signature = document.getElementById('signature');

    // State
    let gi = 0, li = 0, si = 0, ci = 0;
    let currentBubble = null;
    let cursorEl = null;
    let currentSegmentEl = null; // span for current segment being typed

    function createBubble() {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      cursorEl = document.createElement('span');
      cursorEl.className = 'cursor';
      bubble.appendChild(cursorEl);
      container.appendChild(bubble);
      requestAnimationFrame(() => requestAnimationFrame(() => bubble.classList.add('visible')));
      return bubble;
    }

    function insertBeforeCursor(el) {
      currentBubble.insertBefore(el, cursorEl);
    }

    function addLineBreak() {
      insertBeforeCursor(document.createElement('br'));
    }

function startSegment(seg) {
  const span = document.createElement('span');
  if (seg.color) span.style.color = COLOR;
  if (seg.color) span.style.fontWeight = '700'; /* ← ajoute cette ligne */
  insertBeforeCursor(span);
  currentSegmentEl = span;
}

    function typeNextChar() {
      if (gi >= groups.length) {
        if (cursorEl) cursorEl.remove();
        signature.classList.add('visible');
        setTimeout(() => btnContainer.classList.add('visible'), 400);
        return;
      }

      const group = groups[gi];
      const line = group[li];
      const seg = line[si];

      // Init bubble at start of group
      if (li === 0 && si === 0 && ci === 0) {
        currentBubble = createBubble();
      }

      // Init line break (not for first line)
      if (si === 0 && ci === 0 && li > 0) {
        addLineBreak();
      }

      // Init segment span
      if (ci === 0) {
        startSegment(seg);
      }

      if (ci < seg.text.length) {
        currentSegmentEl.textContent += seg.text[ci];
        ci++;
        setTimeout(typeNextChar, 55);
      } else {
        // Move to next segment, line, or group
        si++;
        ci = 0;
        if (si < line.length) {
          setTimeout(typeNextChar, 0);
        } else {
          si = 0;
          li++;
          if (li < group.length) {
            setTimeout(typeNextChar, 400);
          } else {
            li = 0;
            gi++;
            cursorEl.remove();
            setTimeout(typeNextChar, 700);
          }
        }
      }
    }

    setTimeout(typeNextChar, 600);
  </script>
</body>
</html>
